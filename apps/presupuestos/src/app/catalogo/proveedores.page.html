<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="mx-auto max-w-5xl">
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-semibold text-slate-800">Proveedores</h1>
    @if (esAdmin()) {
      <p-button
        label="Nuevo proveedor"
        icon="pi pi-plus"
        (onClick)="abrirCrear()"
      ></p-button>
    }
  </div>

  <p-table
    [value]="proveedores()"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10, 25, 50]"
    [loading]="cargando()"
    sortMode="single"
    dataKey="id"
    [tableStyle]="{ 'min-width': '40rem' }"
  >
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="id" style="width: 5rem">
          ID <p-sortIcon field="id"></p-sortIcon>
        </th>
        <th pSortableColumn="nombre">
          Nombre <p-sortIcon field="nombre"></p-sortIcon>
        </th>
        @if (esAdmin()) {
          <th style="width: 9rem">Acciones</th>
        }
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.id }}</td>
        <td>{{ row.nombre }}</td>
        @if (esAdmin()) {
          <td>
            <div class="flex gap-2">
              <p-button
                icon="pi pi-pencil"
                size="small"
                severity="secondary"
                [text]="true"
                ariaLabel="Editar"
                (onClick)="abrirEditar(row)"
              ></p-button>
              <p-button
                icon="pi pi-trash"
                size="small"
                severity="danger"
                [text]="true"
                ariaLabel="Eliminar"
                (onClick)="eliminar(row)"
              ></p-button>
            </div>
          </td>
        }
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td [attr.colspan]="esAdmin() ? 3 : 2" class="text-center text-slate-500">
          Sin proveedores registrados.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [visible]="dialogVisible()"
  (visibleChange)="dialogVisible.set($event)"
  [header]="editandoId() === null ? 'Nuevo proveedor' : 'Editar proveedor'"
  [modal]="true"
  [style]="{ width: '28rem' }"
  [closeOnEscape]="true"
>
  <form [formGroup]="form" (ngSubmit)="guardar()" class="flex flex-col gap-3">
    <div class="flex flex-col gap-1">
      <label for="proveedor-nombre" class="text-sm text-slate-700">Nombre</label>
      <input
        pInputText
        id="proveedor-nombre"
        type="text"
        formControlName="nombre"
        autocomplete="off"
      />
      @if (form.controls['nombre'].invalid && form.controls['nombre'].touched) {
        <small class="text-red-600">Nombre obligatorio (mínimo 2 caracteres).</small>
      }
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <p-button
        type="button"
        label="Cancelar"
        severity="secondary"
        [text]="true"
        (onClick)="cerrarDialog()"
      ></p-button>
      <p-button
        type="submit"
        label="Guardar"
        icon="pi pi-check"
        [disabled]="form.invalid"
      ></p-button>
    </div>
  </form>
</p-dialog>
