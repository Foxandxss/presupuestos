<main class="min-h-screen bg-slate-100 flex items-center justify-center p-6">
  <p-card header="Iniciar sesión" subheader="Presupuestos" styleClass="w-full max-w-md">
    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-2">
        <label for="email" class="text-sm font-medium text-slate-700">Email</label>
        <input
          pInputText
          id="email"
          type="email"
          autocomplete="username"
          formControlName="email"
          [attr.aria-invalid]="form.controls.email.invalid && form.controls.email.touched ? true : null"
        />
        @if (form.controls.email.touched && form.controls.email.errors) {
          <small class="text-red-600">Introduce un email válido.</small>
        }
      </div>

      <div class="flex flex-col gap-2">
        <label for="password" class="text-sm font-medium text-slate-700">Contraseña</label>
        <p-password
          inputId="password"
          formControlName="password"
          [feedback]="false"
          [toggleMask]="true"
          autocomplete="current-password"
          styleClass="w-full"
          [inputStyle]="{ width: '100%' }"
        ></p-password>
        @if (form.controls.password.touched && form.controls.password.errors) {
          <small class="text-red-600">Mínimo 6 caracteres.</small>
        }
      </div>

      @if (error(); as err) {
        <p-message severity="error" [text]="err" />
      }

      <p-button
        type="submit"
        label="Entrar"
        icon="pi pi-sign-in"
        [loading]="enviando()"
        [disabled]="enviando()"
        styleClass="w-full"
      ></p-button>
    </form>
  </p-card>
</main>
