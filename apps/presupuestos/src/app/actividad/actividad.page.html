<pre-list-page>
  <pre-page-header
    slot="header"
    titulo="Actividad"
    descripcion="Eventos del sistema: pedidos creados y transicionados, consumos registrados."
  />

  <pre-list-toolbar
    slot="toolbar"
    [mostrarSearch]="false"
    [densidad]="densidad()"
    [hayFiltros]="hayFiltrosActivos()"
    [resumen]="resumen()"
    (densidadChange)="onDensidadChange($event)"
    (limpiarFiltros)="limpiarFiltros()"
  >
    <div slot="filtros" class="flex flex-wrap items-center gap-2">
      <p-multiSelect
        [options]="opcionesTipo"
        optionLabel="label"
        optionValue="value"
        [ngModel]="tipoFiltro()"
        (ngModelChange)="onTipoChange($any($event))"
        placeholder="Tipo de evento"
        appendTo="body"
        [filter]="false"
        styleClass="pre-lista__filter"
        ariaLabel="Filtrar por tipo de evento"
      ></p-multiSelect>
      <p-datePicker
        [ngModel]="desdeDate()"
        (ngModelChange)="onDesdeChange($any($event))"
        dateFormat="yy-mm-dd"
        appendTo="body"
        placeholder="Desde"
        [showClear]="true"
        styleClass="pre-lista__filter"
        ariaLabel="Filtrar desde fecha"
      ></p-datePicker>
      <p-datePicker
        [ngModel]="hastaDate()"
        (ngModelChange)="onHastaChange($any($event))"
        dateFormat="yy-mm-dd"
        appendTo="body"
        placeholder="Hasta"
        [showClear]="true"
        styleClass="pre-lista__filter"
        ariaLabel="Filtrar hasta fecha"
      ></p-datePicker>
    </div>
  </pre-list-toolbar>

  @if (errorCarga(); as err) {
    <pre-error-state
      titulo="No se pudo cargar la actividad"
      [descripcion]="err"
      (reintentar)="reintentar()"
    />
  } @else if (cargando() && items().length === 0) {
    <pre-loading-state [cuenta]="6" />
  } @else if (total() === 0) {
    @if (hayFiltrosActivos()) {
      <pre-empty-state
        variante="sin-resultados"
        titulo="Ningún evento cumple los filtros"
        descripcion="Ajusta o limpia los filtros para volver a verlos."
      >
        <p-button
          label="Limpiar filtros"
          severity="secondary"
          [outlined]="true"
          (onClick)="limpiarFiltros()"
        ></p-button>
      </pre-empty-state>
    } @else {
      <pre-empty-state
        variante="primer-uso"
        titulo="Sin actividad todavía"
        descripcion="Cuando se creen pedidos o se registren consumos aparecerán aquí."
      />
    }
  } @else {
    <p-table
      [value]="items()"
      [lazy]="true"
      [paginator]="true"
      [rows]="filasPorPagina()"
      [first]="first()"
      [totalRecords]="total()"
      [rowsPerPageOptions]="[10, 25, 50]"
      [loading]="cargando()"
      dataKey="recurso.id"
      [tableStyle]="{ 'min-width': '50rem' }"
      [styleClass]="'pre-lista__table is-' + densidad()"
      (onLazyLoad)="onLazyLoad($event)"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 13rem">Fecha</th>
          <th style="width: 14rem">Tipo</th>
          <th>Descripción</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr class="pre-lista__row" (click)="onClickEvento(row)">
          <td>{{ formatearFecha(row.fecha) }}</td>
          <td>{{ etiquetaTipo(row.tipo) }}</td>
          <td>{{ row.descripcion }}</td>
        </tr>
      </ng-template>
    </p-table>
  }
</pre-list-page>
